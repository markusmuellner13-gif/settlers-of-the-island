    <path d="M256 130 L368 230 L144 230 Z" fill="url(#roof)" stroke="#7a2a1d" stroke-width="12" stroke-linejoin="round"/>
    <rect x="232" y="280" width="48" height="72" rx="6" fill="#7a4a12"/>
  </g>
