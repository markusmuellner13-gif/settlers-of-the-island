  </defs>
  <!-- background -->
  <rect width="512" height="512" rx="108" fill="url(#sea)"/>
  <!-- subtle waves -->
  <g stroke="#ffffff" stroke-opacity=".12" stroke-width="10" fill="none" stroke-linecap="round">
