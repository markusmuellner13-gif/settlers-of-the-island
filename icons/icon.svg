<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="sea" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#2a85ba"/>
      <stop offset="100%" stop-color="#0e3a5c"/>
    </radialGradient>
    <linearGradient id="hexg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0c84a"/>
      <stop offset="100%" stop-color="#d99a26"/>
