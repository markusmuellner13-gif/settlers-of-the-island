<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Settlers of the Island</title>
  <meta name="description" content="A faithful mobile adaptation of the classic settlement-building board game. Play solo against the computer or pass-and-play with friends." />
  <meta name="theme-color" content="#0e3a5c" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Start menu -->
  <div id="menu" class="screen">
    <div class="menu-card">
      <div class="menu-logo">
        <img src="icons/icon.svg" alt="" width="96" height="96" />
      </div>
      <h1>Settlers of the Island</h1>
      <p class="subtitle">Build roads, found settlements, rule the island.</p>
      <div class="menu-section">
        <label>Players</label>
        <div id="player-config"></div>
      </div>
      <button id="btn-start" class="btn primary big">Start Game</button>
      <p class="menu-hint">Solo: keep 1 human + computer opponents.<br/>Pass &amp; play: set several seats to Human.</p>
    </div>
  </div>

  <!-- Game screen -->
  <div id="game" class="screen hidden">
    <header id="topbar">
      <button id="btn-menu" class="icon-btn" title="Menu">☰</button>
      <div id="player-chips"></div>
      <button id="btn-log" class="icon-btn" title="Game log">📜</button>
    </header>

    <div id="board-wrap">
      <svg id="board" preserveAspectRatio="xMidYMid meet"></svg>
      <div id="banner" class="hidden"></div>
      <div id="dice-overlay" class="hidden">
        <div class="die" id="die1"></div>
        <div class="die" id="die2"></div>
      </div>
    </div>

    <div id="toast-area"></div>

    <footer id="bottombar">
      <div id="hand"></div>
      <div id="actions">
        <button id="btn-roll" class="btn primary">🎲 Roll</button>
        <div class="tray-piece" id="tray-road" data-piece="road" title="Drag a road onto the board">
          <svg viewBox="0 0 40 40"></svg>
          <span class="cost" data-cost="brick,lumber"></span><span class="left"></span>
        </div>
        <div class="tray-piece" id="tray-settlement" data-piece="settlement" title="Drag a settlement onto the board">
          <svg viewBox="0 0 40 40"></svg>
          <span class="cost" data-cost="brick,lumber,wool,grain"></span><span class="left"></span>
        </div>
        <div class="tray-piece" id="tray-city" data-piece="city" title="Drag a city onto a settlement">
          <svg viewBox="0 0 40 40"></svg>
          <span class="cost" data-cost="grain,grain,ore,ore,ore"></span><span class="left"></span>
        </div>
        <button id="btn-dev" class="btn">🃏 Dev</button>
        <button id="btn-trade" class="btn">⚖️ Trade</button>
        <button id="btn-end" class="btn warn">End Turn</button>
      </div>
    </footer>

    <div id="log-panel" class="hidden"><div id="log-list"></div></div>
  </div>

  <!-- Generic modal -->
  <div id="modal" class="hidden"><div id="modal-card"></div></div>

  <script type="module" src="js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
</body>
</html>
